<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBDJE9CoS_N8fdtqgHYwDMWPGkFuCIj5zo",
            authDomain: "minsukim-database-72105.firebaseapp.com",
            projectId: "minsukim-database-72105",
            storageBucket: "minsukim-database-72105.firebasestorage.app",
            messagingSenderId: "532092657612",
            appId: "1:532092657612:web:a2f8cfb62deb71ce6d4769",
            measurementId: "G-EZ9Z5RVM9J"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="bg-grid"></div>
    <header>
        <div class="container">
            <nav>
                <div class="logo" onclick="location.href='/'" style="cursor: pointer;">PRECISION<span>ROBOTICS</span></div>
                <ul class="nav-links">
                    <li><a href="/about" data-i18n="nav-about">회사소개</a></li>
                    <li><a href="/products" data-i18n="nav-products">제품</a></li>
                    <li><a href="/business" data-i18n="nav-business">사업영역</a></li>
                    <li><a href="/board" data-i18n="nav-community">커뮤니티</a></li>
                    <li><a href="/affiliates" data-i18n="nav-affiliates">관련회사</a></li>
                </ul>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <button id="lang-toggle-btn" class="btn-cyber" style="background: transparent; color: var(--text-color); border: 1px solid var(--border-color); font-size: 0.7rem; padding: 0.3rem 0.6rem;" onclick="toggleLanguage()">ENGLISH</button>
                    <div class="mobile-menu-toggle" id="mobile-toggle">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <div class="mobile-nav" id="mobile-nav">
        <a href="/about" data-i18n="nav-about" onclick="toggleMobileMenu()">회사소개</a>
        <a href="/products" data-i18n="nav-products" onclick="toggleMobileMenu()">제품</a>
        <a href="/business" data-i18n="nav-business" onclick="toggleMobileMenu()">사업영역</a>
        <a href="/board" data-i18n="nav-community" onclick="toggleMobileMenu()">커뮤니티</a>
        <a href="/affiliates" data-i18n="nav-affiliates" onclick="toggleMobileMenu()">관련회사</a>
    </div>

    <main id="app-root">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container" style="padding: 40px 0; border-top: 1px solid var(--border-color); margin-top: 60px; color: var(--gray-mid); font-size: 0.8rem;" data-i18n="footer-rights">
            &copy; 2026 Precision Control Robotics. All rights reserved. Powered by Antigravity.
        </div>
    </footer>

    <script>
        // Scroll Reveal Animation
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-visible');
                }
            });
        }, observerOptions);

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('section, .product-card, .business-card').forEach(el => {
                el.classList.add('reveal-hidden');
                observer.observe(el);
            });

            // Mobile Menu Logic
            const mobileToggle = document.getElementById('mobile-toggle');
            const mobileNav = document.getElementById('mobile-nav');

            mobileToggle.addEventListener('click', () => {
                toggleMobileMenu();
            });
        });

        function toggleMobileMenu() {
            const mobileToggle = document.getElementById('mobile-toggle');
            const mobileNav = document.getElementById('mobile-nav');
            mobileNav.classList.toggle('active');
            
            // Hamburger animation
            const spans = mobileToggle.querySelectorAll('span');
            if (mobileNav.classList.contains('active')) {
                spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                spans[1].style.opacity = '0';
                spans[2].style.transform = 'rotate(-45deg) translate(7px, -7px)';
            } else {
                spans[0].style.transform = 'none';
                spans[1].style.opacity = '1';
                spans[2].style.transform = 'none';
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
