{% extends "base.html" %}

{% block title %}News & Community | Precision Control Robotics{% endblock %}

{% block content %}
<div class="container" style="padding: 100px 0;">
    <div class="board-header">
        <h1 style="font-size: 3rem; font-weight: 800;" data-i18n="board-title">소식 및 커뮤니티</h1>
        <button class="btn-cyber" data-i18n="btn-write" onclick="location.href='/write'">글쓰기</button>
    </div>

    <div class="category-tabs">
        <a href="javascript:void(0)" onclick="loadPosts('')" class="tab active" id="tab-all" data-i18n="tab-all">전체</a>
        <a href="javascript:void(0)" onclick="loadPosts('news')" class="tab" id="tab-news" data-i18n="tab-news">뉴스</a>
        <a href="javascript:void(0)" onclick="loadPosts('notice')" class="tab" id="tab-notice"
            data-i18n="tab-notice">공지사항</a>
        <a href="javascript:void(0)" onclick="loadPosts('tech')" class="tab" id="tab-tech"
            data-i18n="tab-tech">기술블로그</a>
        <a href="javascript:void(0)" onclick="loadPosts('qna')" class="tab" id="tab-qna" data-i18n="tab-qna">Q&A</a>
    </div>

    <div
        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; gap: 1rem; flex-wrap: wrap;">
        <div class="search-container" style="display: flex; gap: 0.5rem; flex-grow: 1; max-width: 600px;">
            <select id="search-type"
                style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); font-size: 0.8rem; min-width: 120px;">
                <option value="all" data-i18n="search-type-all">제목+내용</option>
                <option value="title" data-i18n="search-type-title">제목만</option>
                <option value="content" data-i18n="search-type-content">내용만</option>
                <option value="author" data-i18n="search-type-author">작성자</option>
                <option value="comment" data-i18n="search-type-comment">댓글 내용</option>
            </select>
            <input type="text" id="search-input" data-i18n="search-placeholder" placeholder="검색어를 입력하세요"
                style="flex-grow: 1; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); font-size: 0.8rem;">
            <button class="btn-cyber" id="btn-search" onclick="loadPosts()"
                style="padding: 0.5rem 1.5rem; font-size: 0.8rem; flex-shrink: 0; white-space: nowrap;"
                data-i18n="btn-search">검색</button>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <select id="sort-selector" onchange="loadPosts(currentCategory)"
                style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); font-size: 0.8rem;">
                <option value="latest" data-i18n="sort-latest">최신순</option>
                <option value="oldest" data-i18n="sort-oldest">오래된 순</option>
                <option value="views" data-i18n="sort-views">조회순</option>
                <option value="likes" data-i18n="sort-likes">추천순</option>
            </select>
        </div>
    </div>

    <table class="post-table">
        <thead>
            <tr style="text-align: left; color: var(--gray-mid); font-size: 0.8rem; text-transform: uppercase;">
                <th style="padding: 1rem;" data-i18n="table-title">제목</th>
                <th style="padding: 1rem;" data-i18n="table-author">작성자</th>
                <th style="padding: 1rem;" data-i18n="table-date">날짜</th>
                <th style="padding: 1rem;" data-i18n="table-views">조회수</th>
            </tr>
        </thead>
        <tbody id="posts-body">
            <!-- Posts will be loaded here via Firebase -->
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentCategory = '';

    async function loadPosts(category = null) {
        if (category !== null) currentCategory = category;
        const postsBody = document.getElementById('posts-body');
        const currentLang = localStorage.getItem('preferred_lang') || 'ko';
        const dict = translations[currentLang];
        const sortBy = document.getElementById('sort-selector').value;
        const searchType = document.getElementById('search-type').value;
        const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();

        postsBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem;">${dict['loading']}</td></tr>`;

        // Update active tab
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if (!currentCategory) document.getElementById('tab-all').classList.add('active');
        else document.getElementById('tab-' + currentCategory).classList.add('active');

        let query = db.collection('posts');
        if (currentCategory) {
            query = query.where('category', '==', currentCategory);
        }

        try {
            const snapshot = await query.get();
            let posts = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                posts.push({ id: doc.id, ...data });
            });

            // Filter posts based on search query
            if (searchQuery) {
                if (searchType === 'comment') {
                    const commentMatches = await Promise.all(posts.map(async post => {
                        const commentsSnapshot = await db.collection('posts').doc(post.id).collection('comments').get();
                        let found = false;
                        commentsSnapshot.forEach(cDoc => {
                            if ((cDoc.data().content || '').toLowerCase().includes(searchQuery)) found = true;
                        });
                        return found ? post : null;
                    }));
                    posts = commentMatches.filter(p => p !== null);
                } else {
                    posts = posts.filter(post => {
                        const title = (post.title || '').toLowerCase();
                        const content = (post.content || '').toLowerCase();
                        const author = (post.author || '').toLowerCase();

                        if (searchType === 'all') {
                            return title.includes(searchQuery) || content.includes(searchQuery);
                        } else if (searchType === 'title') {
                            return title.includes(searchQuery);
                        } else if (searchType === 'content') {
                            return content.includes(searchQuery);
                        } else if (searchType === 'author') {
                            return author.includes(searchQuery);
                        }
                        return true;
                    });
                }
            }

            // Client-side sorting to avoid Firestore index requirements
            posts.sort((a, b) => {
                if (sortBy === 'latest') return b.date_posted.toDate() - a.date_posted.toDate();
                if (sortBy === 'oldest') return a.date_posted.toDate() - b.date_posted.toDate();
                if (sortBy === 'views') return (b.views || 0) - (a.views || 0);
                if (sortBy === 'likes') {
                    const scoreA = (a.likes ? a.likes.length : 0) - (a.dislikes ? a.dislikes.length : 0);
                    const scoreB = (b.likes ? b.likes.length : 0) - (b.dislikes ? b.dislikes.length : 0);
                    return scoreB - scoreA;
                }
                return 0;
            });

            postsBody.innerHTML = '';

            if (posts.length === 0) {
                const noPostsText = currentLang === 'ko' ? '검색 결과가 없거나 등록된 게시글이 없습니다.' : 'No posts found.';
                postsBody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem;">${noPostsText}</td></tr>`;
                return;
            }

            posts.forEach(post => {
                const date = post.date_posted.toDate().toLocaleDateString(currentLang === 'ko' ? 'ko-KR' : 'en-US');
                const row = `
                    <tr class="post-row" onclick="location.href='/post/${post.id}'">
                        <td data-label="${dict['table-title']}" style="padding: 1.5rem 1rem;">
                            <div style="font-weight: 600;">${post.title}</div>
                            <div style="font-size: 0.7rem; color: var(--gray-mid); margin-top: 4px;">#${(post.category || 'ALL').toUpperCase()}</div>
                        </td>
                        <td data-label="${dict['table-author']}">${post.author || dict['anonymous']}</td>
                        <td data-label="${dict['table-date']}">${date}</td>
                        <td data-label="${dict['table-views']}">${post.views || 0}</td>
                    </tr>
                `;
                postsBody.innerHTML += row;
            });
        } catch (error) {
            console.error("Error loading posts:", error);
            postsBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red; padding: 2rem;">${dict['loading']} (Error: ${error.message})</td></tr>`;
        }
    }

    // Add event listener for Enter key on search input
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loadPosts();
                }
            });
        }
    });

    // Initial load
    window.onload = () => loadPosts();
</script>
{% endblock %}
