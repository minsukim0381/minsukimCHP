{% extends "base.html" %}

{% block title %}Create Post | Precision Control Robotics{% endblock %}

{% block content %}
<div class="container" style="padding: 100px 0; max-width: 800px;">
    <h1 style="font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 800; margin-bottom: 2rem;" data-i18n="write-title">새 게시글 작성</h1>
    
    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div>
            <label style="display: block; font-weight: 700; margin-bottom: 0.5rem;" data-i18n="label-author">작성자 이름</label>
            <input type="text" id="post-author-input" style="width: 100%; padding: 1rem; border: 1px solid var(--border-color); border-radius: 4px;" data-i18n="placeholder-author" placeholder="비워두면 '익명'으로 표시됩니다">
        </div>

        <div>
            <label style="display: block; font-weight: 700; margin-bottom: 0.5rem;" data-i18n="label-password">삭제 비밀번호</label>
            <input type="password" id="post-password-input" style="width: 100%; padding: 1rem; border: 1px solid var(--border-color); border-radius: 4px;" data-i18n="placeholder-password" placeholder="삭제 시 사용할 비밀번호를 입력하세요">
        </div>

        <div>
            <label style="display: block; font-weight: 700; margin-bottom: 0.5rem;" data-i18n="label-title">제목</label>
            <input type="text" id="post-title" style="width: 100%; padding: 1rem; border: 1px solid var(--border-color); border-radius: 4px;" data-i18n="placeholder-title" placeholder="제목을 입력하세요">
        </div>
        
        <div>
            <label style="display: block; font-weight: 700; margin-bottom: 0.5rem;" data-i18n="label-category">카테고리</label>
            <select id="post-category" style="width: 100%; padding: 1rem; border: 1px solid var(--border-color); border-radius: 4px;">
                <option value="news" data-i18n="tab-news">News</option>
                <option value="notice" data-i18n="tab-notice">Notice</option>
                <option value="tech" data-i18n="tab-tech">Tech Blog</option>
                <option value="qna" data-i18n="tab-qna">Q&A</option>
            </select>
        </div>

        <div>
            <label style="display: block; font-weight: 700; margin-bottom: 0.5rem;" data-i18n="label-content">내용 (마크다운 지원)</label>
            <textarea id="post-content" style="width: 100%; height: 400px; padding: 1rem; border: 1px solid var(--border-color); border-radius: 4px; font-family: inherit;" data-i18n="placeholder-content" placeholder="내용을 입력하세요..."></textarea>
        </div>

        <div>
            <label style="display: block; font-weight: 700; margin-bottom: 0.5rem;" data-i18n="label-image-upload">사진 첨부 (옵션)</label>
            <input type="file" id="post-image-input" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button type="button" class="btn-cyber" style="background: transparent; border: 1px solid var(--accent-neon-cyan); color: var(--accent-neon-cyan); padding: 0.5rem 1rem; font-size: 0.8rem;" onclick="document.getElementById('post-image-input').click()" data-i18n="btn-select-file">파일 선택</button>
                <span id="post-image-filename" style="color: var(--gray-mid); font-size: 0.9rem;" data-i18n="no-file-selected">선택된 파일 없음</span>
            </div>
            <div id="post-image-preview-container" style="display: none; margin-top: 1rem; position: relative; max-width: 300px;">
                <img id="post-image-preview" src="" style="width: 100%; border-radius: 8px; border: 1px solid var(--border-color);" alt="Preview">
                <button type="button" style="position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: white; width: 30px; height: 30px; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center;" onclick="clearUploadedImage()">✕</button>
            </div>
        </div>

        <button class="btn-cyber" id="submit-btn" data-i18n="btn-publish" onclick="submitPost()">게시글 등록</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let uploadedImageUrl = "";

    async function handleImageUpload(input) {
        const currentLang = localStorage.getItem('preferred_lang') || 'ko';
        const dict = translations[currentLang];
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        document.getElementById('post-image-filename').removeAttribute('data-i18n');
        document.getElementById('post-image-filename').innerText = file.name;

        const formData = new FormData();
        formData.append('file', file);

        try {
            document.getElementById('post-image-filename').innerText = dict['uploading'];
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.url) {
                uploadedImageUrl = data.url;
                document.getElementById('post-image-filename').innerText = file.name;
                document.getElementById('post-image-preview').src = data.url;
                document.getElementById('post-image-preview-container').style.display = 'block';
            } else {
                alert(dict['upload-failed'] + (data.error || ""));
                clearUploadedImage();
            }
        } catch (e) {
            console.error("Upload error:", e);
            alert(dict['upload-error']);
            clearUploadedImage();
        }
    }

    function clearUploadedImage() {
        const currentLang = localStorage.getItem('preferred_lang') || 'ko';
        const dict = translations[currentLang];
        uploadedImageUrl = "";
        document.getElementById('post-image-input').value = "";
        document.getElementById('post-image-filename').setAttribute('data-i18n', 'no-file-selected');
        document.getElementById('post-image-filename').innerText = dict['no-file-selected'];
        document.getElementById('post-image-preview-container').style.display = 'none';
        document.getElementById('post-image-preview').src = "";
    }

    async function submitPost() {
        const currentLang = localStorage.getItem('preferred_lang') || 'ko';
        const dict = translations[currentLang];
        const authorInput = document.getElementById('post-author-input').value.trim();
        const authorName = authorInput || dict['anonymous'];
        const password = document.getElementById('post-password-input').value;
        const title = document.getElementById('post-title').value;
        const category = document.getElementById('post-category').value;
        const content = document.getElementById('post-content').value;
        const btn = document.getElementById('submit-btn');

        if (!title || !password || !content) {
            alert(dict['alert-title-password']);
            return;
        }

        let userId = localStorage.getItem('robot_site_userid');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('robot_site_userid', userId);
        }

        btn.disabled = true;
        btn.innerText = dict['publish-loading'];

        try {
            await db.collection('posts').add({
                title,
                category,
                content,
                author: authorName,
                author_id: userId,
                password: password,
                image_url: uploadedImageUrl,
                date_posted: firebase.firestore.Timestamp.now(),
                views: 0,
                likes: [],
                dislikes: [],
                vote_score: 0
            });
            alert(dict['publish-success']);
            location.href = '/board';
        } catch (error) {
            console.error("Error publishing post:", error);
            alert((currentLang === 'ko' ? '오류 발생: ' : 'Error: ') + error.message);
            btn.disabled = false;
            btn.innerText = dict['btn-publish'];
        }
    }
</script>
{% endblock %}
